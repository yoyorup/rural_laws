<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>历史归档 · 农村法律每日速览</title>
  <style>
    /* ── Reset & base ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.7;
      color: #2d2d2d;
      background: #f5f5f0;
    }
    a { color: #1a6bbf; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Layout ─────────────────────────────────────────── */
    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: #1a3a5c;
      color: #d0dde8;
      padding: 0;
      display: flex;
      flex-direction: column;
    }
    .sidebar-brand {
      background: #0e2440;
      padding: 20px 18px;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      letter-spacing: 0.5px;
    }
    .sidebar-brand small {
      display: block;
      font-size: 11px;
      font-weight: normal;
      color: #7fa3c0;
      margin-top: 4px;
    }
    .sidebar nav {
      padding: 20px 0;
      flex: 1;
    }
    .sidebar nav a {
      display: block;
      padding: 10px 20px;
      color: #a8c4d8;
      font-size: 14px;
      border-left: 3px solid transparent;
      transition: background 0.15s, color 0.15s;
    }
    .sidebar nav a:hover,
    .sidebar nav a.active {
      background: rgba(255,255,255,0.07);
      color: #fff;
      border-left-color: #4da6ff;
      text-decoration: none;
    }
    .sidebar-footer {
      padding: 14px 18px;
      font-size: 11px;
      color: #5a7a90;
      border-top: 1px solid #24506e;
    }

    /* ── Main content ───────────────────────────────────── */
    .main {
      flex: 1;
      overflow-x: hidden;
    }
    .topbar {
      background: #fff;
      border-bottom: 1px solid #e0e0d8;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a3a5c;
    }
    .topbar .date-badge {
      background: #e8f0f8;
      color: #1a3a5c;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
    }
    .content {
      padding: 28px;
      max-width: 1100px;
    }

    /* ── Cards ──────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e4e4dc;
      padding: 22px 26px;
      margin-bottom: 18px;
      transition: box-shadow 0.15s;
    }
    .card:hover {
      box-shadow: 0 3px 14px rgba(0,0,0,0.09);
    }
    .card-title {
      font-size: 17px;
      font-weight: 600;
      color: #1a3a5c;
      margin-bottom: 6px;
    }
    .card-meta {
      font-size: 12px;
      color: #888;
      margin-bottom: 10px;
    }
    .card-meta span { margin-right: 14px; }
    .card-summary { color: #555; font-size: 14px; }
    .card-actions { margin-top: 14px; }
    .btn {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-primary {
      background: #1a6bbf;
      color: #fff;
    }
    .btn-primary:hover { background: #1558a0; text-decoration: none; }

    /* ── Source badges ──────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .badge-npc  { background: #dff0d8; color: #2d6a4f; }
    .badge-moa  { background: #d0e8f8; color: #1a4a70; }
    .badge-gov  { background: #fce8c0; color: #7a4800; }

    /* ── Score pill ─────────────────────────────────────── */
    .score-pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      background: #edf4fe;
      color: #1a6bbf;
      margin-left: 8px;
    }

    /* ── Section headers ────────────────────────────────── */
    .section-header {
      font-size: 15px;
      font-weight: 600;
      color: #1a3a5c;
      border-left: 4px solid #1a6bbf;
      padding-left: 10px;
      margin: 24px 0 14px;
    }

    /* ── Empty state ─────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 14px; }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; min-width: 0; }
      .sidebar nav { display: flex; flex-wrap: wrap; padding: 10px; }
      .sidebar nav a { border-left: none; border-bottom: 2px solid transparent; }
    }
  </style>
  
<style>
  .archive-date-group {
    background: #fff;
    border-radius: 8px;
    border: 1px solid #e4e4dc;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .archive-date-header {
    background: #1a3a5c;
    color: #fff;
    padding: 12px 20px;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .archive-date-header .count {
    font-size: 12px;
    background: rgba(255,255,255,0.2);
    padding: 2px 10px;
    border-radius: 10px;
  }
  .archive-law-item {
    padding: 12px 20px;
    border-bottom: 1px solid #f0f0ea;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .archive-law-item:last-child { border-bottom: none; }
  .archive-law-title {
    color: #1a3a5c;
    font-size: 14px;
    flex: 1;
  }
  .archive-law-meta {
    color: #999;
    font-size: 12px;
    white-space: nowrap;
  }
</style>

</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      农村法律每日速览

    </div>
    <nav>
      <a href="index.html"
         class="">

      <a href="archive.html"

    </nav>
    <div class="sidebar-footer">

  </aside>

  <!-- Main -->
  <div class="main">

      <h1>历史归档</h1>
      <span class="date-badge">今日：2026-02-27</span>
    </div>

</div>

</html>
